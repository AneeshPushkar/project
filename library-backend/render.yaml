services:
  - type: web
    name: library-management-backend
    runtime: java
    rootDir: .
    buildCommand: ./mvnw clean package -DskipTests
    startCommand: java -jar target/library-management-backend-0.0.1-SNAPSHOT.jar
    plan: free
    envVars:
      - key: JAVA_VERSION
        value: 21
      - key: MONGODB_URI
        sync: false
      - key: APP_JWT_SECRET
        sync: false
      - key: APP_CORS_ALLOWED_ORIGINS
        sync: false
