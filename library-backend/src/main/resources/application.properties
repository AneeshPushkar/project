spring.application.name=library-management-system

# SERVER
server.port=${PORT:8080}

# DATABASE (MongoDB Atlas)
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/library_management}
spring.data.mongodb.auto-index-creation=true

# JWT
app.jwt.secret=${APP_JWT_SECRET:LibraryManagementSecretKey2024SuperSecureKeyForJWTTokenGeneration123}
app.jwt.expiration=86400000

# CORS
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,http://localhost:4200,http://localhost:5174}

# LOGGING
logging.level.com.librarymanagement=DEBUG
logging.level.org.springframework.security=DEBUG

# TEMP FIX
spring.main.allow-circular-references=true